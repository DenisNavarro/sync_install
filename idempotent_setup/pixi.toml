[workspace]
name = "setup"
channels = ["conda-forge"]
platforms = ["linux-64"]

[feature.make.dependencies]
make = "*"

[feature.openssl.dependencies]
openssl = "*"

[feature.perl.dependencies]
perl = "*"

[feature.pkgconfig.dependencies]
pkg-config = "*"

[environments]
make = {features = ["make"], solve-group = "default"}
make-perl = {features = ["make", "perl"], solve-group = "default"}
openssl-pkgconfig = {features = ["openssl", "pkgconfig"], solve-group = "default"}
